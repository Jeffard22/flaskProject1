<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Flask Сайт{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='/style.css') }}">

  </head>
  <body >

    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Мой сайт</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">О нас</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">Контакты</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Контент -->
    <main class="container py-5">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
<footer>
    <div class="footer-container text-center py-3 bg-dark text-light">
        <p class="mb-1">&copy; {{ current_year }} Мій сайт. Усі права захищено.</p>
        <nav>
            <a class="text-decoration-none text-info mx-2" href="{{ url_for('index') }}">Головна</a>
            <a class="text-decoration-none text-info mx-2" href="{{ url_for('about') }}">Про нас</a>
            <a class="text-decoration-none text-info mx-2" href="{{ url_for('contact') }}">Контакти</a>
        </nav>
    </div>
</footer>


</html>
