<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сообщения</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h1>Полученные сообщения</h1>
  <table class="table table-striped mt-3">
    <thead>
      <tr>
        <th>Имя</th>
        <th>Email</th>
        <th>Сообщение</th>
        <th>Дата</th>
      </tr>
    </thead>
    <tbody>
      {% for msg in messages %}
      <tr>
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.message }}</td>
        <td>{{ msg.date.strftime('%Y-%m-%d %H:%M') }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="4" class="text-center">Сообщений нет</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <a href="/" class="btn btn-primary">На главную</a>
</body>
</html>
